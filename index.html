html, body {
  width: 100%; height: 100%;
  background-color: #04061a !important;
  overflow: hidden;
  font-family: 'Cormorant Garamond', serif;
  cursor: crosshair;
}

/* ════════════════════════════════
   STAR MAP (base layer)
════════════════════════════════ */
.nebula {
  position: fixed; inset: 0; z-index: 0;
  background-color: #04061a;
  background-image:
    radial-gradient(ellipse 60% 40% at 20% 30%, rgba(45,27,94,0.55) 0%, transparent 70%),
    radial-gradient(ellipse 50% 35% at 80% 70%, rgba(92,26,58,0.45) 0%, transparent 65%),
    radial-gradient(ellipse 70% 50% at 55% 15%, rgba(13,43,110,0.4) 0%, transparent 70%),
    radial-gradient(ellipse 40% 30% at 10% 80%, rgba(45,27,94,0.3) 0%, transparent 60%),
    radial-gradient(ellipse 55% 40% at 90% 20%, rgba(92,26,58,0.25) 0%, transparent 65%);
}
.nebula::after {
  content: '';
  position: absolute; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  opacity: 0.35; pointer-events: none;
}

.title {
  position: fixed; top: 38px; left: 50%;
  transform: translateX(-50%);
  z-index: 10; text-align: center;
  pointer-events: none; user-select: none;
  opacity: 0; transition: opacity 1.5s ease;
}
.title.visible { opacity: 1; }
.title h1 {
  font-family: 'Cinzel', serif; font-weight: 400;
  font-size: clamp(16px, 2.2vw, 26px); letter-spacing: 0.22em;
  color: #d8c8ff !important; text-transform: uppercase;
  text-shadow: 0 0 30px rgba(184,160,232,0.8), 0 0 60px rgba(184,160,232,0.4);
}
.title .subtitle {
  margin-top: 6px; font-size: clamp(12px, 1.2vw, 16px);
  letter-spacing: 0.35em; color: rgba(200,216,255,0.75) !important;
  font-style: italic; text-transform: uppercase;
}
.title-line {
  margin: 10px auto 0; width: 120px; height: 1px;
  background: linear-gradient(90deg, transparent, #b8a0e8, transparent);
  opacity: 0.4;
}

#sky { position: fixed; inset: 0; z-index: 1; }
#constellation-lines { position: fixed; inset: 0; z-index: 2; pointer-events: none; }

.star { position: fixed; z-index: 5; transform: translate(-50%,-50%); cursor: pointer; }
.star-dot {
  border-radius: 50%; background: white;
  box-shadow: 0 0 3px 1px rgba(200,216,255,0.8), 0 0 8px 2px rgba(184,160,232,0.4), 0 0 16px 4px rgba(100,120,255,0.2);
  animation: twinkle var(--twinkle-dur,3s) ease-in-out infinite;
  animation-delay: var(--twinkle-delay,0s);
  transition: transform 0.25s ease, box-shadow 0.25s ease;
}
@keyframes twinkle {
  0%,100% { opacity:1; transform:scale(1); }
  40%      { opacity:0.4; transform:scale(0.7); }
  70%      { opacity:0.85; transform:scale(0.95); }
}
.star:hover .star-dot {
  animation-play-state: paused; transform: scale(2.5);
  box-shadow: 0 0 6px 3px rgba(255,255,255,0.95), 0 0 18px 8px rgba(200,216,255,0.7), 0 0 40px 16px rgba(184,160,232,0.45), 0 0 70px 25px rgba(100,120,255,0.25);
}
.phrase-card {
  position: absolute; bottom: calc(100% + 14px); left: 50%;
  transform: translateX(-50%) translateY(6px);
  background: rgba(8,6,30,0.82); border: 1px solid rgba(184,160,232,0.25);
  border-radius: 10px; padding: 12px 18px;
  width: max-content; max-width: 220px; text-align: center;
  color: #fff !important; font-size: 13.5px; font-style: italic;
  line-height: 1.55; letter-spacing: 0.02em;
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  box-shadow: 0 0 20px rgba(184,160,232,0.12), 0 4px 24px rgba(0,0,0,0.5);
  opacity: 0; pointer-events: none;
  transition: opacity 0.3s ease, transform 0.3s ease; white-space: normal;
}
.phrase-card::after {
  content: ''; position: absolute; top: 100%; left: 50%;
  transform: translateX(-50%); border: 6px solid transparent;
  border-top-color: rgba(184,160,232,0.25);
}
.star:hover .phrase-card, .star.active .phrase-card {
  opacity: 1; transform: translateX(-50%) translateY(0); pointer-events: auto;
}
.star.flip-down .phrase-card { bottom: auto; top: calc(100% + 14px); transform: translateX(-50%) translateY(-6px); }
.star.flip-down:hover .phrase-card, .star.flip-down.active .phrase-card { transform: translateX(-50%) translateY(0); }
.star.flip-down .phrase-card::after { top: auto; bottom: 100%; border-top-color: transparent; border-bottom-color: rgba(184,160,232,0.25); }

.bg-star {
  position: fixed; border-radius: 50%; background: white;
  pointer-events: none; z-index: 1;
  animation: twinkle var(--t,4s) ease-in-out infinite;
  animation-delay: var(--d,0s);
}

.hint {
  position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
  z-index: 10; font-family: 'Cinzel', serif; font-size: 10px;
  letter-spacing: 0.3em; color: rgba(184,160,232,0.5) !important;
  text-transform: uppercase; pointer-events: none;
  opacity: 0; transition: opacity 1s ease;
}
.hint.visible { opacity: 1; }

/* ════════════════════════════════
   INTRO OVERLAY
════════════════════════════════ */
#intro {
  position: fixed; inset: 0; z-index: 100;
  background-color: #04061a;
  overflow: hidden; cursor: pointer; user-select: none;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
}

/* intro shares the same nebula look */
#intro-bg {
  position: absolute; inset: 0; z-index: 0;
  background-color: #04061a;
  background-image:
    radial-gradient(ellipse 60% 40% at 20% 30%, rgba(45,27,94,0.55) 0%, transparent 70%),
    radial-gradient(ellipse 50% 35% at 80% 70%, rgba(92,26,58,0.45) 0%, transparent 65%),
    radial-gradient(ellipse 70% 50% at 55% 15%, rgba(13,43,110,0.4) 0%, transparent 70%),
    radial-gradient(ellipse 40% 30% at 10% 80%, rgba(45,27,94,0.3) 0%, transparent 60%),
    radial-gradient(ellipse 55% 40% at 90% 20%, rgba(92,26,58,0.25) 0%, transparent 65%);
}

/* twinkling micro-stars inside intro */
.intro-star {
  position: absolute; border-radius: 50%; background: white;
  pointer-events: none;
  animation: twinkle var(--t,3s) ease-in-out infinite;
  animation-delay: var(--d,0s);
}

/* centre content */
#intro-center {
  position: relative; z-index: 2;
  display: flex; flex-direction: column;
  align-items: center; gap: 48px;
  width: 85vw; max-width: 560px;
  text-align: center;
}

/* "Begin Journey" shown on slide 0 */
#begin-block {
  display: flex; flex-direction: column; align-items: center; gap: 18px;
  transition: opacity 0.5s ease;
}
#begin-label {
  font-family: 'Cinzel', serif;
  font-size: clamp(18px, 3vw, 28px);
  letter-spacing: 0.3em;
  color: #d8c8ff !important;
  text-transform: uppercase;
  text-shadow: 0 0 30px rgba(184,160,232,0.7);
  animation: beginGlow 3s ease-in-out infinite;
}
@keyframes beginGlow {
  0%,100% { text-shadow: 0 0 20px rgba(184,160,232,0.5); }
  50%      { text-shadow: 0 0 50px rgba(184,160,232,0.9), 0 0 80px rgba(184,160,232,0.4); }
}
#begin-arrow {
  width: 28px; height: 28px;
  border-right: 2px solid rgba(184,160,232,0.7);
  border-bottom: 2px solid rgba(184,160,232,0.7);
  transform: rotate(45deg);
  animation: arrowBounce 1.6s ease-in-out infinite;
  margin-top: 4px;
}
@keyframes arrowBounce {
  0%,100% { transform: rotate(45deg) translateY(0);   opacity: 0.5; }
  50%      { transform: rotate(45deg) translateY(8px); opacity: 1; }
}

/* story text shown on slides 1+ */
#intro-message {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(18px, 3.8vw, 32px);
  font-style: italic; font-weight: 300;
  letter-spacing: 0.05em; line-height: 1.6;
  color: rgba(220,230,255,0.93) !important;
  text-shadow: 0 0 40px rgba(150,180,255,0.4);
  min-height: 3em;
  transition: opacity 1.2s ease;
  display: none;
  text-align: center;
}

/* tap hint at bottom */
#intro-tap {
  position: absolute; bottom: 36px; left: 50%;
  transform: translateX(-50%);
  font-family: 'Cinzel', serif; font-size: 10px;
  letter-spacing: 0.35em; color: rgba(184,160,232,0.4) !important;
  text-transform: uppercase; white-space: nowrap; z-index: 2;
  animation: tapPulse 2.5s ease-in-out infinite;
}
@keyframes tapPulse { 0%,%{opacity:0.3;} 50%{opacity:0.8;} }

/* skip button */
#intro-skip {
  position: absolute; top: 24px; right: 28px;
  z-index: 10;
  font-family: 'Cinzel', serif;
  font-size: 10px;
  letter-spacing: 0.3em;
  color: rgba(184,160,232,0.45) !important;
  text-transform: uppercase;
  cursor: pointer;
  padding: 6px 4px;
  border-bottom: 1px solid rgba(184,160,232,0.2);
  transition: color 0.3s ease, border-color 0.3s ease;
}
#intro-skip:hover {
  color: rgba(184,160,232,0.9) !important;
  border-color: rgba(184,160,232,0.6);
}
#warp { position:fixed; inset:0; z-index:200; pointer-events:none; opacity:0; }
#warp canvas { position:absolute; inset:0; width:100%; height:100%; }

// ── BUILD STAR MAP ────────────────────────
const sky   = document.getElementById('sky');
const svgEl = document.getElementById('constellation-lines');
const starById = {};
groups.forEach(g => g.stars.forEach(s => starById[s.id]=s));

groups.forEach(g => {
  g.lines.forEach(([a,b]) => {
    const sa=starById[a], sb=starById[b]; if(!sa||!sb) return;
    const line=document.createElementNS('http://www.w3.org/2000/svg','line');

groups.forEach(g => {
  g.stars.forEach(s => {
    const dur=(2.5+Math.random()*3).toFixed(2)+'s';
    const delay=(Math.random()*4).toFixed(2)+'s';

    el.className='star';
    el.style.left=s.x+'%'; el.style.top=s.y+'%';
    if(s.y<20) el.classList.add('flip-down');
    el.innerHTML=`<div class="star-dot" style="width:${s.size}px;height:${s.size}px;--twinkle-dur:${dur};--twinkle-delay:${delay};"></div><div class="phrase-card">${s.phrase}</div>`;

  d.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*100}%;width:${sz}px;height:${sz}px;opacity:${(Math.random()*0.5+0.15).toFixed(2)};--t:${(2+Math.random()*5).toFixed(1)}s;--d:${(Math.random()*6).toFixed(1)}s;`;

function initStarTaps(){
  document.querySelectorAll('.star').forEach(star=>{
    star.addEventListener('click',e=>{
      e.stopPropagation();
      const isActive=star.classList.contains('active');
      document.querySelectorAll('.star.active').forEach(s=>s.classList.remove('active'));
      if(!isActive) star.classList.add('active');
    });
  });
  document.addEventListener('click',()=>{
    document.querySelectorAll('.star.active').forEach(s=>s.classList.remove('active'));
  });
}

// ── INTRO TWINKLING STARS ─────────────────
const introBg = document.getElementById('intro-bg');
for(let i=0;i<220;i++){
  const s=document.createElement('div');
  s.className='intro-star';
  const sz=Math.random()*1.6+0.2;
  s.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;opacity:${(Math.random()*0.6+0.1).toFixed(2)};--t:${(2+Math.random()*5).toFixed(1)}s;--d:${(Math.random()*6).toFixed(1)}s;`;

// ── SLIDES ────────────────────────────────
const slides = [
  null, // slide 0 = Begin Journey screen
  "We first met on December 30th, 2025.",
  "Today is April 9th, 2026.",
  "And it has been 100 days since we first met.",
  "I first responded to you on Hinge on November 24th, 2025.",
  "After a quick exchange on the 29th…",
  "You ghosted me until the 20th of December, upon your return from Chile.",
  "Oh how life likes to foreshadow stuff :P",
  "Anyways…",
  "Thank you for sharing so many wonderful memories with me over the past 100 days.",
  "I hope I have brought at least some sense of joy into your life, as well as many a memorable moments — just like you've brought to mine.",
  "Enjoy this little collection of memories",
  "as written in the stars",
  "WARP"
];

let slideIndex = 0;

const intro       = document.getElementById('intro');
const beginBlock  = document.getElementById('begin-block');
const introMsg    = document.getElementById('intro-message');
const introTap    = document.getElementById('intro-tap');

function fadeInText(text){
  introMsg.style.display = 'block';
  introMsg.style.opacity = '0';
  introMsg.textContent   = text;
  requestAnimationFrame(()=>{
    requestAnimationFrame(()=>{ introMsg.style.opacity = '1'; });
  });
}

function clearText(cb){
  introMsg.style.opacity = '0';
  setTimeout(()=>{ introMsg.textContent = ''; if(cb) cb(); }, 1200);
}

function hideBeignBlock(cb){
  beginBlock.style.opacity = '0';
  setTimeout(()=>{ beginBlock.style.display = 'none'; if(cb) cb(); }, 500);
}

function advanceSlide(){
  slideIndex++;
  if(slideIndex >= slides.length) return;

  const text = slides[slideIndex];

  if(slideIndex === 1){
    hideBeignBlock(()=> clearText(()=> fadeInText(text)));
    return;
  }

  if(text === 'WARP'){
    introTap.style.display = 'none';
    clearText(()=> doWarp());
    return;
  }

  if(text){ clearText(()=> fadeInText(text)); }
}

intro.addEventListener('click', advanceSlide);

document.getElementById('intro-skip').addEventListener('click', e => {
  e.stopPropagation();
  e.preventDefault();
  intro.removeEventListener('click', advanceSlide);
  document.getElementById('intro-tap').style.display = 'none';
  document.getElementById('intro-skip').style.display = 'none';
  document.getElementById('begin-block').style.display = 'none';
  document.getElementById('intro-message').style.opacity = '0';
  setTimeout(()=> doWarp(), 300);
});

// ── WARP ──────────────────────────────────
function doWarp(){
  const warpEl = document.getElementById('warp');
  const canvas = document.getElementById('warp-canvas');
  const ctx    = canvas.getContext('2d');
  canvas.width = window.innerWidth; canvas.height = window.innerHeight;

  // fill black first so streaks are visible from frame 1
  ctx.fillStyle = '#04061a';
  ctx.fillRect(0,0,canvas.width,canvas.height);

  warpEl.style.opacity = '1';
  const cx=canvas.width/2, cy=canvas.height/2;
  const streaks=Array.from({length:320},()=>{
    const angle=Math.random()*Math.PI*2;
    const dist=Math.random()*0.4+0.05;
    return{x:cx+Math.cos(angle)*canvas.width*dist, y:cy+Math.sin(angle)*canvas.height*dist, angle, speed:Math.random()*2+0.5, len:0, alpha:Math.random()*0.6+0.4};
  });

  let frame=0; const totalFrames=120;
  function drawWarp(){
    // dark trail so streaks accumulate nicely
    ctx.fillStyle='rgba(4,6,26,0.25)';
    ctx.fillRect(0,0,canvas.width,canvas.height);

    const progress=frame/totalFrames;
    streaks.forEach(s=>{
      const spd=s.speed*(1+progress*18);
      s.x+=Math.cos(s.angle)*spd; s.y+=Math.sin(s.angle)*spd;
      s.len=Math.min(s.len+spd*2,120);
      const tail = {x: s.x-Math.cos(s.angle)*s.len, y: s.y-Math.sin(s.angle)*s.len};
      const grad=ctx.createLinearGradient(tail.x,tail.y,s.x,s.y);
      grad.addColorStop(0,'rgba(255,255,255,0)');
      grad.addColorStop(1,`rgba(200,220,255,${s.alpha*Math.min(progress*3,1)})`);
      ctx.beginPath(); ctx.strokeStyle=grad;
      ctx.lineWidth=Math.random()<0.08?2:1;
      ctx.moveTo(tail.x,tail.y); ctx.lineTo(s.x,s.y); ctx.stroke();
    });

    // flash only in the last 20% of frames
    if(progress>0.80){
      const f=(progress-0.80)/0.20;
      ctx.fillStyle=`rgba(215,228,255,${f*0.95})`;
      ctx.fillRect(0,0,canvas.width,canvas.height);
    }

    frame++;
    if(frame<totalFrames){ requestAnimationFrame(drawWarp); }
    else{
      intro.style.transition='opacity 0.7s ease'; intro.style.opacity='0';
      setTimeout(()=>{
        intro.style.display='none';
        warpEl.style.transition='opacity 0.8s ease'; warpEl.style.opacity='0';
        document.querySelector('.title').classList.add('visible');
        document.querySelector('.hint').classList.add('visible');
        initStarTaps();
      },700);
    }
  }
  requestAnimationFrame(drawWarp);
}
</script>
